name: Build and Publish Docker Image to GHCR

on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew build

      - name: Determine tags, build, and publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/$OWNER/back-end"
          TAGS="$IMAGE:${{ github.sha }}"

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAGS="$TAGS,$IMAGE:$VERSION"
          elif [[ "${{ github.ref_type }}" == "branch" && "${{ github.ref_name }}" != "main" ]]; then
            SAFE_NAME=$(echo "${{ github.ref_name }}" | tr '/' '-')
            TAGS="$TAGS,$IMAGE:$SAFE_NAME"
          else
            TAGS="$TAGS,$IMAGE:latest"
          fi

          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$OWNER" --password-stdin

          BUILD_ARGS=""
          IFS=',' read -ra TAG_ARR <<< "$TAGS"
          for tag in "${TAG_ARR[@]}"; do
            BUILD_ARGS="$BUILD_ARGS -t $tag"
          done

          docker build \
            -f src/main/docker/Dockerfile.jvm \
            $BUILD_ARGS .

          for tag in "${TAG_ARR[@]}"; do
            docker push "$tag"
          done
